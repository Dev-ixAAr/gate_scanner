# ============================================================================
# gate_scanner — Dart Analysis Options
# Extends official flutter_lints with stricter production rules.
# These rules enforce code quality, catch common bugs, and ensure
# consistent style across the scanner app codebase.
# ============================================================================

include: package:flutter_lints/flutter.yaml

analyzer:
  # --------------------------------------------------------------------------
  # Treat these as errors (build will fail if violated)
  # --------------------------------------------------------------------------
  errors:
    # Unused imports waste memory and obscure dependencies
    unused_import: error
    # Unused local variables indicate incomplete logic
    unused_local_variable: warning
    # Dead code indicates logic errors
    dead_code: warning
    # Missing return in non-void functions is a bug
    missing_return: error
    # Undefined names are compile errors
    undefined_name: error
    # Invalid assignments catch type mismatches early
    invalid_assignment: error

  exclude:
    # Exclude generated files from analysis
    # These are auto-generated by build_runner and should not be linted
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "lib/generated/**"

  language:
    # Enforce strict null safety — no implicit null assumptions
    strict-casts: true
    strict-inference: true
    strict-raw-types: true

linter:
  rules:
    # --------------------------------------------------------------------------
    # STYLE RULES
    # --------------------------------------------------------------------------

    # Enforce camelCase for variables and parameters
    - camel_case_types
    - camel_case_extensions

    # Enforce lowercase_with_underscores for file names
    - file_names

    # Prefer single quotes for strings (consistency)
    - prefer_single_quotes

    # Trailing commas make diffs cleaner and auto-formatting better
    - require_trailing_commas

    # Always use curly braces for control flow statements
    - curly_braces_in_flow_control_structures

    # --------------------------------------------------------------------------
    # NULL SAFETY RULES
    # --------------------------------------------------------------------------

    # Avoid using dynamic type — use explicit types instead
    - avoid_dynamic_calls

    # Use null-aware operators where possible
    - prefer_null_aware_operators
    - null_closures

    # --------------------------------------------------------------------------
    # PERFORMANCE RULES
    # --------------------------------------------------------------------------

    # Use const constructors when possible to reduce widget rebuilds
    - prefer_const_constructors
    - prefer_const_constructors_in_immutables
    - prefer_const_declarations
    - prefer_const_literals_to_create_immutables

    # Avoid unnecessary object creation
    - avoid_unnecessary_containers

    # --------------------------------------------------------------------------
    # ERROR PREVENTION RULES
    # --------------------------------------------------------------------------

    # Always await Future-returning functions
    - unawaited_futures

    # Avoid empty catch blocks — always handle errors explicitly
    - avoid_empty_catches

    # Avoid print() — use proper logging
    - avoid_print

    # Cancel stream subscriptions to prevent memory leaks
    - cancel_subscriptions

    # Close sinks to prevent resource leaks
    - close_sinks

    # --------------------------------------------------------------------------
    # FLUTTER SPECIFIC RULES
    # --------------------------------------------------------------------------

    # Use SizedBox instead of Container for whitespace
    - sized_box_for_whitespace

    # Use SizedBox.shrink() instead of Container() for empty widgets
    - sized_box_shrink_expand

    # Sort child properties last in widget constructors
    - sort_child_properties_last

    # Avoid unnecessary overrides
    - unnecessary_overrides

    # --------------------------------------------------------------------------
    # CODE ORGANIZATION RULES
    # --------------------------------------------------------------------------

    # Sort pub dependencies alphabetically (consistency)
    - sort_pub_dependencies

    # Annotate public APIs with types
    - type_annotate_public_apis

    # Use /// for documentation comments
    - slash_for_doc_comments

    # Avoid redundant argument values that match defaults
    - avoid_redundant_argument_values